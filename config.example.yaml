# =============================================================================
# HH AI Job Matcher — пример конфигурации
# =============================================================================
#
# Этот файл — ШАБЛОН. Перед запуском проекта скопируй его в config.yaml:
#
#     copy config.example.yaml config.yaml         (Windows cmd)
#     Copy-Item config.example.yaml config.yaml    (PowerShell)
#     cp config.example.yaml config.yaml           (macOS / Linux)
#
# Затем открой config.yaml и заполни секцию `profile` под себя.
# Остальные секции можно оставить с дефолтами.
#
# ВАЖНО:
# - config.yaml не коммитится в git (он в .gitignore).
# - DeepSeek API key никогда не пиши в этот файл напрямую — используй .env
#   или переменную окружения DEEPSEEK_API_KEY.
# =============================================================================


# -----------------------------------------------------------------------------
# DeepSeek — провайдер LLM-анализа.
# Ключ можно получить на https://platform.deepseek.com (раздел API Keys).
# Стоимость примерно $0.01–0.05 за полный анализ батча из 20 вакансий.
# -----------------------------------------------------------------------------
deepseek:
  # Подставится из переменной окружения. Положи DEEPSEEK_API_KEY=sk-... в .env
  # в корне проекта, или экспортируй вручную:
  #   $env:DEEPSEEK_API_KEY="sk-..."   (PowerShell)
  #   set DEEPSEEK_API_KEY=sk-...      (cmd)
  api_key: "${DEEPSEEK_API_KEY}"
  base_url: "https://api.deepseek.com"
  model: "deepseek-chat"


# -----------------------------------------------------------------------------
# Search — какие вакансии собирать с hh.ru.
#
# Самый простой способ собрать urls для своих запросов:
#   1. Открой hh.ru/search/vacancy
#   2. Введи запрос, выбери фильтры (опыт, регион, формат) и нажми «Найти»
#   3. Скопируй URL из адресной строки целиком и вставь сюда
#
# Полезные параметры в URL:
#   text=...                    — текст запроса
#   experience=noExperience     — без опыта (для джунов / стажёров)
#   experience=between1And3     — 1–3 года
#   area=1                      — Москва (113 = Россия, 2 = СПб)
#   schedule=remote             — удалённо
#   employment=full             — полная занятость
# -----------------------------------------------------------------------------
search:
  # Используй либо одиночный `url`, либо список `urls`.
  # Каждый URL парсится отдельно, дубли вакансий между запросами убираются
  # по id и по нормализованной паре «title + company».
  urls:
    - "https://hh.ru/search/vacancy?text=python+стажёр&experience=noExperience&area=1"
    - "https://hh.ru/search/vacancy?text=python+junior&experience=noExperience&area=1"
    - "https://hh.ru/search/vacancy?text=AI+automation&experience=noExperience&area=1"
    - "https://hh.ru/search/vacancy?text=telegram+bot+python&experience=noExperience&area=1"

  # Сколько страниц парсить с каждого URL. На странице ~20 вакансий.
  # Для первого пробного запуска поставь 2–3.
  max_pages: 10

  # Задержки между страницами и вакансиями (в секундах, диапазон [min, max]).
  # Антидетект — не уменьшай меньше 3 секунд, иначе hh.ru покажет капчу или 403.
  delay_between_pages: [4, 8]
  delay_between_vacancy: [3, 6]

  # false = браузер видимый (нужен для решения капчи руками).
  # true = headless, но тогда первая капча остановит весь прогон.
  headless: false

  # true = сохранять весь HTML каждой вакансии в SQLite. Отжирает ~150 КБ
  # на вакансию. Включай только для отладки парсера.
  save_raw_html: false


# -----------------------------------------------------------------------------
# Proxy (опционально). Помогает если hh.ru начал банить твой IP.
# Формат URL: http://user:pass@host:port или socks5://host:port
# -----------------------------------------------------------------------------
proxy:
  enabled: false
  url: ""


# =============================================================================
# Profile — ТВОЙ ПРОФИЛЬ КАНДИДАТА. Заполни внимательно.
# =============================================================================
#
# LLM сравнивает каждую вакансию с этой секцией и выдаёт два балла:
#   my_fit_for_them  — насколько ты закрываешь требования вакансии
#   their_fit_for_me — насколько вакансия подходит тебе
# Итоговый fit_score = min(my_fit_for_them, their_fit_for_me).
#
# ПРАВИЛО: чем конкретнее и доказательнее ты опишешь себя в `summary` и
# `pet_projects`, тем точнее будут оценки. Цифры (просмотры, скачивания,
# места в хакатонах, годы опыта) поднимают my_fit_for_them. Размытые фразы
# вроде «интересуюсь Python» — занижают.
#
# =============================================================================
profile:
  # Имя для подстановки в промпт. Может быть полное ФИО или просто имя.
  name: "Иван Иванов"

  # `summary` — главный текст. Сюда пишешь самое важное:
  # 1) образование (вуз, курс, направление, год выпуска);
  # 2) текущий технический стек коротко;
  # 3) shipped-проекты с конкретикой (где опубликовано, метрики);
  # 4) публикации, хакатоны, олимпиады с реальными цифрами;
  # 5) опыт работы, если есть, — даже неинженерный;
  # 6) сильные стороны и предпочтения по работе.
  #
  # Чем точнее факты, тем меньше LLM будет домысливать.
  # Размер: 2–4 КБ оптимально. До 6–8 КБ — допустимо.
  summary: |
    Студент 3 курса вуза N по направлению «Информационные системы и технологии».
    Выпуск 2027 год. Москва.

    Ищу стажировку или junior-позицию в направлениях:
    - Python Backend (FastAPI + LLM API + Telegram-боты);
    - AI Automation Engineer (RAG, LLM-агенты, интеграции через API);
    - Telegram Bot Developer.

    Ключевые активы:
    1. PROJECT_NAME — описание проекта, ссылка/домен, метрики
       (например: «100 пользователей», «приложение в Google Play»,
       «5000 прочтений статьи»). Конкретика важнее общих слов.
    2. ОПЫТ РАБОТЫ: компания, должность, период, что делал.
    3. ХАКАТОНЫ / ОЛИМПИАДЫ: место, проект, стек.
    4. ПУБЛИКАЦИИ: где, заголовки, прочтения / лайки.

    Технологии в ежедневном использовании: Python (asyncio, FastAPI, requests),
    SQL, Git, Docker, Linux. LLM-инструменты: ChatGPT, Claude, Cursor.

    Сильные стороны: довожу задачи до прода, читаю документацию на английском,
    готов учиться под ментором.

  # `skills` — плоский список навыков в нижнем регистре.
  # Включай только те, которые реально использовал.
  # LLM использует список для матчинга со списком требований вакансии.
  skills:
    # Языки и базовые библиотеки
    - python
    - asyncio
    - fastapi
    - requests
    # Базы данных
    - sql
    - sqlite
    - postgresql
    # Telegram
    - aiogram
    - telegram bot api
    # LLM и AI
    - llm api
    - openai api
    - cursor
    - claude code
    # DevOps
    - git
    - github
    - docker
    - linux
    - bash
    # Прочее
    - rest api
    - json
    - automation
    - web scraping
    # Языки общения
    - английский b2

  # `pet_projects` — список твоих проектов, по одной строке на проект.
  # Формат: «Название — короткое описание + ключевые метрики и стек».
  # Метрики делают тебя весомее в глазах LLM.
  pet_projects:
    - "MyApp — мобильное приложение в Google Play, 500 скачиваний, Flutter + Firebase"
    - "MyBot — Telegram-бот на aiogram, обслуживает 200 активных пользователей в месяц"
    - "Хакатон XYZ 2024 (3-е место): проект автоматизации, стек Python + ChatGPT API"
    - "Статья на Хабре «...» — 10 000 прочтений, +25 рейтинг"

  # `hard_no` — что точно НЕ подходит. LLM понизит фит-скор для таких вакансий.
  # Чем конкретнее формулировка, тем лучше.
  hard_no:
    - "senior/middle без стажёрского или junior-friendly формата"
    - "строгий опыт от 3 лет коммерческой разработки"
    - "1С как основной стек"
    - "Java как основной стек"
    - "PHP как основной стек"
    - "C++ / C# / .NET как основной стек"
    - "frontend-only без Python / backend / AI-составляющей"
    - "чистые продажи без разработки"
    - "вакансии без наставника при задачах уровня middle/senior"

  # Минимальная зарплата в рублях. Если в вакансии указана меньше — LLM
  # понизит their_fit_for_me. Pre-filter без LLM срежет вакансии ниже
  # 0.6 * min_salary_rub.
  min_salary_rub: 40000

  # Предпочтения по локации. Можно указывать русские и английские варианты —
  # LLM матчит по тексту вакансии.
  location_preference:
    - "remote"
    - "удалённо"
    - "moscow"
    - "москва"
    - "hybrid"
    - "гибрид"


# -----------------------------------------------------------------------------
# Analysis — параметры пайплайна анализа.
# -----------------------------------------------------------------------------
analysis:
  # Сколько вакансий отдавать на анализ за один запуск стадии `analyze`.
  # Не делай больше 50 — DeepSeek может троттлить.
  batch_size: 20

  # Сколько LLM-запросов выполнять параллельно. 4 — безопасный дефолт.
  # На быстром интернете можно 6–8, рискуя получить rate limit.
  concurrency: 4

  # Минимальный fit_score (0..1) для попадания в matches.json и в зелёную
  # секцию отчёта. 0.70 = только реально хорошие совпадения.
  min_fit_score: 0.70

  # Куда сохранять matches.json. Относительный путь от корня проекта.
  output: "results/matches.json"
